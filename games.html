  #game2048 {
    position: fixed;

    height: 320px;
    background: #bbada0;
    border-radius: 15px;
    padding: 15px;
    box-sizing: border-box;
    user-select: none;
    font-family: 'Montserrat', sans-serif;
    box-shadow:
      0 4px 6px rgba(0,0,0,0.3),
      inset 0 2px 0 rgba(255,255,255,0.3);
    cursor: grab;
    z-index: 9999;
  }
  #game2048:active {
    cursor: grabbing;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-gap: 15px;
    width: 100%;
    height: 100%;
    background: #bbada0;
    border-radius: 15px;
    padding: 15px;
    box-sizing: border-box;
  }
  .cell {
    width: 60px;
    height: 60px;
    background: #cdc1b4;
    border-radius: 10px;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.3);
  }
  .tile {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 28px;
    line-height: 60px;
    text-align: center;
    color: #776e65;
    user-select: none;
    transition: transform 0.18s ease, background-color 0.18s ease, color 0.18s ease;
    will-change: transform;
    box-shadow:
      0 4px 0 rgba(0,0,0,0.1),
      inset 0 2px 0 rgba(255,255,255,0.3);
  }
  .tile.new {
    animation: popin 0.25s ease forwards;
  }
  .tile.merged {
    animation: popin 0.25s ease forwards;
  }
  @keyframes popin {
    0% {
      transform: scale(0);
      opacity: 0;
    }
    100% {
      transform: scale(1);
      opacity: 1;
    }
  }
  .scoreboard {

    text-align: center;
    text-shadow: 0 2px 3px rgba(0,0,0,0.3);
