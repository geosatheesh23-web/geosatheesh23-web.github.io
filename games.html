<h1>2048</h1>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #faf8ef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .game-container {
            width: 400px;
            height: 400px;
            background-color: #bbada0;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }
        .tile {
            width: 90px;
            height: 90px;
            background-color: #eee4da;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: bold;
            color: #776e65;
            position: absolute;
        }
        .score {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            color: #776e65;
        }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="score" id="score">Score: 0</div>
    </div>
    <script>
        const container = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score');
        let score = 0;
        let board = Array(4).fill().map(() => Array(4).fill(0));

        function init() {
            addTile();
            addTile();
            draw();
        }

        function addTile() {
            let emptyTiles = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) emptyTiles.push({ r, c });
                }
            }
            if (emptyTiles.length) {
                let { r, c } = emptyTiles[Math.floor(Math.random() * emptyTiles.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function draw() {
            container.innerHTML = '';
            board.forEach((row, r) => {
                row.forEach((value, c) => {
                    if (value) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.style.top = `${r * 100}px`;
                        tile.style.left = `${c * 100}px`;
                        tile.innerText = value;
                        tile.style.backgroundColor = getTileColor(value);
                        container.appendChild(tile);
                    }
                });
            });
            scoreDisplay.innerText = `Score: ${score}`;
        }

        function getTileColor(value) {
            switch (value) {
                case 2: return '#eee4da';
                case 4: return '#ede0c8';
                case 8: return '#f2b179';
                case 16: return '#f59563';
                case 32: return '#f67c5f';
                case 64: return '#f67c5f';
                case 128: return '#edcf72';
                case 256: return '#edcc61';
                case 512: return '#edc850';
                case 1024: return '#edc53f';
                case 2048: return '#edc22e';
                default: return '#cdc1b4';
            }
        }

        function move(direction) {
            let moved = false;
            if (direction === 'left' || direction === 'right') {
                for (let r = 0; r < 4; r++) {
                    let row = board[r].filter(val => val);
                    if (direction === 'right') row.reverse();
                    let newRow = [];
                    for (let i = 0; i < row.length; i++) {
                        if (row[i] === row[i + 1]) {
                            newRow.push(row[i] * 2);
                            score += row[i] * 2;
                            i++;
                        } else {
                            newRow.push(row[i]);
                        }
                    }
                    while (newRow.length < 4) newRow.push(0);
                    if (direction === 'right') newRow.reverse();
                    if (JSON.stringify(newRow) !== JSON.stringify(board[r])) {
                        moved = true;
                        board[r] = newRow;
                    }
                }
            } else {
                for (let c = 0; c < 4; c++) {
                    let col = board.map(row => row[c]).filter(val => val);
                    if (direction === 'down') col.reverse();
                    let newCol = [];
                    for (let i = 0; i < col.length; i++) {
                        if (col[i] === col[i + 1]) {
                            newCol.push(col[i] * 2);
                            score += col[i] * 2;
                            i++;
                        } else {
                            newCol.push(col[i]);
                        }
                    }
                    while (newCol.length < 4) newCol.push(0);
                    if (direction === 'down') newCol.reverse();
                    for (let r = 0; r < 4; r++) {
                        if (board[r][c] !== newCol[r]) {
                            moved = true;
                            board[r][c] = newCol[r];
                        }
                    }
                }
            }
            if (moved) addTile();
            draw();
        }

        document.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'ArrowLeft':
                    move('left');
                    break;
                case 'ArrowRight':
                    move('right');
                    break;
                case 'ArrowUp':
                    move('up');
                    break;
                case 'ArrowDown':
                    move('down');
                    break;
            }
        });

        init();
    </script>
